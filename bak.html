<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Çözüm Görüntüleyici</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .app { width: 100%; height: 100%; position: relative; overflow: hidden; }
        .swipe-container { width: 100%; height: 100%; overflow: hidden; touch-action: pan-y pinch-zoom; }
        .image-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        .image-wrapper img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; user-select: none; pointer-events: none; }

        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0));
            color: white;
            padding: 20px 16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 100;
            pointer-events: none;
        }
        .test-name {
            font-size: 13px;
            font-weight: 500;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        .counter {
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        .nav-buttons {
            position: fixed;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 12px;
            pointer-events: none;
            z-index: 99;
        }
        .nav-btn {
            pointer-events: auto;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
        }
        .nav-btn:active { transform: scale(0.95); background: rgba(0,0,0,0.6); }

        .test-panel {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 200;
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .test-panel.open { right: 0; }
        .test-panel-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-panel-header h3 { color: white; font-size: 16px; font-weight: 600; }
        .close-panel {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-panel:active { background: rgba(255,255,255,0.1); }
        .test-list { flex: 1; overflow-y: auto; padding: 8px 0; }
        .section-header {
            padding: 12px 16px;
            color: #0084ff;
            font-size: 14px;
            font-weight: 700;
            background: rgba(0,132,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-top: 8px;
        }
        .section-header:first-child { margin-top: 0; }
        .test-item {
            padding: 12px 16px 12px 28px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-item:active { background: rgba(255,255,255,0.05); }
        .test-item.active {
            background: rgba(0, 132, 255, 0.2);
            color: white;
            border-left: 3px solid #0084ff;
        }
        .menu-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:active { transform: scale(0.95); background: rgba(0,0,0,0.7); }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .overlay.active { opacity: 1; visibility: visible; }
        .help-tip {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            white-space: nowrap;
            z-index: 102;
            pointer-events: none;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 300;
            display: none;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        @media (max-width: 480px) { .nav-btn { width: 38px; height: 38px; font-size: 18px; } .test-panel { width: 260px; } }
    </style>
</head>

                showImage();
            } else {
                // SON SORUDA SAĞA BASINCA OTOMATİK SONRAKİ TESTE GEÇ
                allTests[currentTestIndex].checked = true;
                saveCheckedStatus();
                if (currentTestIndex + 1 < allTests.length) {
                    currentTestIndex++;
                    currentQuestionIndex = 0;
                    loadTest(currentTestIndex);
                    closePanel();
                } else {
                    if (confirm("Tüm testleri tamamladınız! Başa dönmek ister misiniz?")) {
                        currentTestIndex = 0;
                        currentQuestionIndex = 0;
                        loadTest(currentTestIndex);
                    }
                }
            }
        }

        function prevImage() {
            if (totalQuestions === 0) return;
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showImage();
            } else if (currentTestIndex > 0) {
                currentTestIndex--;
                currentQuestionIndex = allTests[currentTestIndex].questionCount - 1;
                loadTest(currentTestIndex);
                closePanel();
            }
        }

        function goToTest(index) {
            currentTestIndex = index;
            currentQuestionIndex = 0;
            loadTest(currentTestIndex);
            closePanel();
        }

        function updateActiveTestInList() {
            let globalIndex = 0;
            sections.forEach(section => {
                section.tests.forEach((test, idx) => {
                    const element = document.getElementById(`test_${section.name}_${idx}`);
                    if (element) {
                        if (globalIndex === currentTestIndex) {
                            element.classList.add('active');
                        } else {
                            element.classList.remove('active');
                        }
                    }
                    globalIndex++;
                });
            });
        }

        function openPanel() {
            document.getElementById('testPanel').classList.add('open');
            document.getElementById('overlay').classList.add('active');
            buildTestList();
        }
        
        function closePanel() {
            document.getElementById('testPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        function buildTestList() {
            testListDiv.innerHTML = '';
            let globalIndex = 0;
            
            sections.forEach(section => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'section-header';
                sectionDiv.innerText = section.name;
                testListDiv.appendChild(sectionDiv);
                
                section.tests.forEach((test, idx) => {
                    const testItem = document.createElement('div');
                    testItem.id = `test_${section.name}_${idx}`;
                    testItem.className = 'test-item';
                    if (globalIndex === currentTestIndex) testItem.classList.add('active');
                    
                    const checkMark = test.checked ? ' ✓' : '';
                    testItem.innerHTML = `<span>${test.name}${checkMark}</span><span class="test-badge">${test.questionCount} soru</span>`;
                    
                    testItem.addEventListener('click', (function(index) {
                        return function() { goToTest(index); };
                    })(globalIndex));
                    
                    testListDiv.appendChild(testItem);
                    globalIndex++;
                });
            });
        }

        // Touch swipe
        let touchStartX = 0;
        function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
        function handleTouchEnd(e) {
            const diff = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(diff) > 50) { 
                diff > 0 ? prevImage() : nextImage(); 
            }
        }

        // Keyboard
        function handleKeyboard(e) {
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') nextImage();
            else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') prevImage();
        }

        // Event listeners
        document.getElementById('swipeContainer').addEventListener('touchstart', handleTouchStart);
        document.getElementById('swipeContainer').addEventListener('touchend', handleTouchEnd);
        document.getElementById('prev-btn').addEventListener('click', prevImage);
        document.getElementById('next-btn').addEventListener('click', nextImage);
        document.getElementById('menuBtn').addEventListener('click', openPanel);
        document.getElementById('closePanel').addEventListener('click', closePanel);
        document.getElementById('overlay').addEventListener('click', closePanel);
        document.addEventListener('keydown', handleKeyboard);
        window.addEventListener('resize', () => setTimeout(() => showImage(), 100));

        // Başlat
        loadCheckedStatus();
        
        let lastTestIndex = 0;
        for (let i = 0; i < allTests.length; i++) {
            if (!allTests[i].checked) { lastTestIndex = i; break; }
        }
        currentTestIndex = lastTestIndex;
        loadTest(currentTestIndex);
        buildTestList();

        setTimeout(() => {
            const tip = document.createElement('div');
            tip.className = 'help-tip';
            tip.innerHTML = '← → kaydırarak soruları değiştirin | ☰ menüden test seçin';
            document.body.appendChild(tip);
            setTimeout(() => tip.remove(), 4000);
        }, 500);
    </script>
</body>
</html>
